                Then reply "F<N> -> discarded (destructive — not re-sent)" and do nothing else.
            2. Otherwise run EACH evidence command VERBATIM, one per bash call (each is a self-contained
               TOKEN=$(...); curl ... one-liner — the $TOKEN capture only works within a single call).
