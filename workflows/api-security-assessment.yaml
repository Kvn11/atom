# workflows/api-security-assessment.yaml — copy to $ATOM_HOME/workflows/ to run it.
# ALSO copy skill_library/api-recon-toolkit/ -> $ATOM_HOME/skill_library/ (ships the CLI tooling),
# and register an Obsidian vault named "api-security-assessment" (Open folder as vault) before running.
name: api-security-assessment
description: Authorized security & privacy assessment of your own API targets — Step 1 sets up recon values, an observed-API inventory, and a target SDK.
notes:
  enabled: true
  vault: api-security-assessment      # notes split by domain at the root; shared across all runs
inputs:
  - name: targets
    type: file
    required: true
    description: JSON file scoping the primary API targets (one domain, up to 25 endpoints).
  - name: capture
    type: file
    required: true
    description: Burp Suite XML capture of live traffic — reusable headers/cookies/IDs + observed-API inventory.
steps:
  - title: Setup
    description: In parallel — harvest reusable values + inventory observed APIs, and build the target SDK.
    tasks:
      - id: capture_recon
        model: gemini-3.5-flash
        thinking: high
        prompt: |
          You are the LEAD agent coordinating AUTHORIZED reconnaissance of APIs your org owns.
          Your ONLY input this task is the Burp capture at: {{ capture }}
          The toolkit is at /mnt/skill_library/api-recon-toolkit/scripts/ (run with python3 <abs path>).
          The persistent Obsidian vault is "api-security-assessment"; notes are split by DOMAIN at the
          root: <domain>/recon.md and <domain>/endpoints/<slug>.md.

          YOU ARE A COORDINATOR. Do NOT inspect individual endpoints yourself — running `burp.py view`
          on many endpoints in your own context will hit the recursion limit. Inspecting and documenting
          each endpoint is SUB-AGENT work (STEP C). Your job is: map, harvest, delegate, summarize.

          STEP A — map the capture (you do this):
            python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py hosts {{ capture }}
            python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py index {{ capture }} --apis-only --format json
          Keep the resulting list of API items (each has an index, method, and url).

          STEP B — harvest reusable values (you do this):
            python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py harvest {{ capture }} --format json
          Save the JSON to {{ workspace }}/recon/values.json (write_file). Then, for EACH domain, write a
          recon section to {{ workspace }}/recon/<domain>.recon.md whose FIRST line is the heading
          "## Recon — {{ date }}" followed by: Base URLs, Reusable headers, Cookies, Auth/JWT shapes
          (claims only — NEVER a raw token), Candidate identifiers (real IDs reusable as required fields
          when testing targets), Oracles. APPEND it — this domain may already have recon from a prior
          assessment, and appending preserves it (a fresh run stacks under its own dated heading):
            python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py append \
              --vault api-security-assessment --domain <domain> --kind recon \
              --from {{ workspace }}/recon/<domain>.recon.md

          STEP C — DELEGATE one sub-agent PER observed endpoint. For EACH item in the STEP A list, call
          the delegate_task tool. You MUST set subagent_type="bash" (a general-purpose sub-agent has no
          shell and cannot run the toolkit — it will fail). Do NOT run `burp.py view` yourself. You may
          issue several delegate_task calls together so the sub-agents run in parallel. Give each sub-agent
          this EXACT prompt, substituting <INDEX>/<METHOD>/<PATH>/<HOST> for that item:

            You are documenting ONE API endpoint for an authorized security assessment. Do only this one.
            Capture: {{ capture }}. Toolkit: /mnt/skill_library/api-recon-toolkit/scripts/.
            Vault: api-security-assessment (notes split by domain at the root).
            1. Inspect ONLY item index <INDEX> (view is truncated/redacted for you):
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py view {{ capture }} --index <INDEX> --req-headers --resp-headers --cookies
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py view {{ capture }} --index <INDEX> --req-body --resp-body --keys
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py view {{ capture }} --index <INDEX> --decode-auth
            2. Compute the note filename stem:
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py slug "<METHOD> <PATH>"
            3. Write the note body to {{ workspace }}/endpoints/<slug>.md using write_file, with EXACTLY this
               frontmatter + sections (fill in the angle brackets):
                 ---
                 endpoint: <METHOD> <PATH>
                 domain: <HOST>
                 auth: <scheme, e.g. Bearer JWT (alg=HS256) | session cookie | query authorizeCode | none>
                 oracle: <yes|no|unknown>
                 source: capture #<INDEX>
                 status: observed
                 tags: [api-recon]
                 ---
                 # <METHOD> <PATH>
                 ## Request shape
                 ## Response shape
                 ## Headers
                 ## Auth
                 ## Oracle
                 <does it confirm the validity/existence of some data? one line + why>
                 ## Observations
            4. File the note into the vault (create-if-missing — a prior assessment may already have
               documented this endpoint; do NOT clobber its hypotheses/tests):
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py put \
                   --vault api-security-assessment --domain <HOST> --slug <slug> \
                   --from {{ workspace }}/endpoints/<slug>.md --if-missing
               If it prints "NOOP: note exists" the endpoint was documented in a prior run — that is
               fine; leave the existing note as-is and do not try to replace it.
            5. Reply with ONE line: "<METHOD> <PATH> -> oracle=<yes|no|unknown> (new|prior-run)".

          STEP D — summarize (you do this): after every sub-agent has reported, write
          {{ outputs }}/recon-summary.md listing each domain, the number of endpoints documented, and the
          most useful reusable identifiers, then call present_files on it. If STEP A found no API items,
          say so plainly and still record whatever cookies/JWTs harvest found.
      - id: build_sdk
        model: gemini-3.5-flash
        thinking: medium
        prompt: |
          You are the LEAD agent building a small, well-documented Python SDK for the target APIs of an
          authorized security assessment. Your ONLY input this task is the targets file at: {{ targets }}
          The toolkit is at /mnt/skill_library/api-recon-toolkit/scripts/ (run with python3 <abs path>).

          YOU ARE A COORDINATOR. Do NOT inspect individual targets yourself — writing every endpoint's
          method in your own context risks the recursion limit. Authoring each endpoint's SDK function is
          SUB-AGENT work (STEP B). Your job is: list, delegate, assemble.

          STEP A — list the scope (you do this):
            python3 /mnt/skill_library/api-recon-toolkit/scripts/targets.py list {{ targets }} --format json
          Keep the domain and the list of endpoint indices.

          STEP B — DELEGATE one sub-agent PER target endpoint. For EACH index, call delegate_task with
          subagent_type="bash" (REQUIRED — a general-purpose sub-agent has no shell and will fail). You may
          issue several delegate_task calls together to run in parallel. Give each sub-agent this EXACT
          prompt, substituting <INDEX>:

            You are authoring ONE Python SDK function for a target API. Do only this one.
            Targets file: {{ targets }}. Toolkit: /mnt/skill_library/api-recon-toolkit/scripts/.
            1. Read the endpoint's shapes:
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/targets.py show {{ targets }} --index <INDEX> --part both
            2. Compute the module stem: python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py slug "<METHOD> <PATH>"
            3. Write {{ workspace }}/sdk/endpoints/<slug>.py using write_file: a documented httpx-based
               function for THIS endpoint — base_url derived from the targets domain, a configurable auth
               hook (Bearer/cookie placeholder — DO NOT hardcode secrets), typed parameters inferred from
               the request pseudo-schema (mark #required vs #optional), a docstring quoting the observed
               request and response shapes, and TODO comments where the schema is ambiguous.
            4. Reply with ONE line: "wrote sdk/endpoints/<slug>.py for <METHOD> <PATH>".

          STEP C — assemble (you do this): list the modules the sub-agents wrote
          (ls {{ workspace }}/sdk/endpoints/), then write {{ workspace }}/sdk/README.md (install httpx, how
          to wire auth, one usage example per endpoint) and {{ workspace }}/sdk/__init__.py re-exporting
          each endpoint module. Copy the sdk/ directory to {{ outputs }}/sdk/ and call present_files on
          {{ outputs }}/sdk/README.md and {{ outputs }}/sdk/__init__.py.
  - title: Hypothesize
    description: Fan out per target API — develop security + privacy hypotheses and write them to each endpoint note FIRST.
    tasks:
      - id: hypothesize
        model: gemini-3.5-flash
        thinking: high
        prompt: |
          You are the LEAD coordinating security + privacy HYPOTHESIS development for an authorized
          assessment of your org's own API targets. Input: targets file {{ targets }}. Reusable context:
          the capture {{ capture }} and {{ workspace }}/recon/values.json. Toolkit at
          /mnt/skill_library/api-recon-toolkit/scripts/. Vault: api-security-assessment (notes split by
          DOMAIN at the root: <domain>/endpoints/<slug>.md).

          YOU ARE A COORDINATOR. Do NOT analyze endpoints yourself — that is SUB-AGENT work and looping
          over many endpoints will hit the recursion limit. Your job: list, delegate, summarize.

          STEP A — list the targets (you do this):
            python3 /mnt/skill_library/api-recon-toolkit/scripts/targets.py list {{ targets }} --format json
          Keep the domain (call it <HOST>) and the endpoint indices.

          STEP B — DELEGATE one sub-agent PER target endpoint. For EACH index, call delegate_task with
          subagent_type="bash" (REQUIRED — a general-purpose sub-agent has no shell and will fail). You
          may issue several together to run in parallel. Give each sub-agent this EXACT prompt,
          substituting <INDEX> and <HOST>:

            You are developing security + privacy hypotheses for ONE target API endpoint. Do only this one.
            Targets: {{ targets }}. Reusable values: {{ workspace }}/recon/values.json.
            Toolkit: /mnt/skill_library/api-recon-toolkit/scripts/. Vault: api-security-assessment. Domain: <HOST>.
            1. Read the endpoint shape and compute its note stem:
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/targets.py show {{ targets }} --index <INDEX> --part both
               Take <METHOD> and <PATH> from that output, then:
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py slug "<METHOD> <PATH>"
            2. Ensure the endpoint note exists. Try to read it:
                 obsidian vault=api-security-assessment read file="<HOST>/endpoints/<slug>.md"
               If it does NOT exist, create a stub: write {{ workspace }}/hyp/<slug>.md (write_file) with
               frontmatter (endpoint: <METHOD> <PATH> / domain: <HOST> / auth: unknown / oracle: unknown /
               status: target / tags: [api-recon]) plus "## Request shape" and "## Response shape" from
               step 1, then file it:
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py put --vault api-security-assessment --domain <HOST> --slug <slug> --from {{ workspace }}/hyp/<slug>.md --if-missing
            3. Develop hypotheses from the endpoint shape + {{ workspace }}/recon/values.json (reusable IDs
               and other identities). Cover each category with one hypothesis where plausible (else write
               "N/A — reason"): IDOR/BOLA, mass-assignment, broken authn/authz, injection
               (SQLi/XSS/SSRF/path/command), and ALWAYS a PRIVACY hypothesis — "can an unauthorized user
               obtain another user's PII via this endpoint?".
            4. Write the hypotheses to {{ workspace }}/hyp/<slug>.hyp.md (write_file) as:
                 ## Hypotheses — {{ date }}
                 ### H1 — <category> — <one-line theory>
                 - Probe: <concrete request: method, path, which identity, key params/body>
                 - Privacy? <yes/no>
                 ### H2 — ...
               Then append it to the note (preserves prior sections):
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py append --vault api-security-assessment --domain <HOST> --slug <slug> --from {{ workspace }}/hyp/<slug>.hyp.md
            5. Reply ONE line: "<METHOD> <PATH> -> <N> hypotheses (privacy: yes/no)".

          STEP C — summarize (you do this): after all sub-agents report, write
          {{ outputs }}/hypotheses-summary.md (endpoints theorized, total hypotheses, how many flag
          privacy) and call present_files on it.
  - title: Test
    description: Fan out per target API — live-test the hypotheses (safe-by-default), documenting attempts, results, and ID-linked blockers.
    tasks:
      - id: test
        model: gemini-3.5-flash
        thinking: high
        prompt: |
          You are the LEAD coordinating AUTHORIZED live testing of your org's own API targets.
          Targets: {{ targets }}. Capture: {{ capture }}. SDK: {{ workspace }}/sdk/. Reusable values:
          {{ workspace }}/recon/values.json. Toolkit at /mnt/skill_library/api-recon-toolkit/scripts/.
          Vault: api-security-assessment.

          YOU ARE A COORDINATOR. Do NOT test endpoints yourself — delegate each to a sub-agent.

          SAFETY (safe-by-default): only NON-DESTRUCTIVE probes may be sent (reads / non-mutating). For
          any state-changing/destructive hypothesis (DELETE, account/data mutation, password/email
          change), DOCUMENT the exact probe but DO NOT SEND it — mark it destructive-skipped.

          STEP A — build the identity roster (you do this): the capture holds all in-scope identities/test
          accounts. Enumerate them:
            python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py identities {{ capture }} --format json
          Note each identity's user id, source item index, cookie names, and user-agent; and the corpus
          User-Agent/header style from {{ workspace }}/recon/values.json. You will pass the relevant
          identities to each sub-agent (an ATTACKER identity + a VICTIM user id for cross-user/privacy tests).

          ANTI-BOT RULES — copy these into EVERY sub-agent prompt: mint-once (reuse a captured token;
          re-mint only on a 401, never pre-emptively); use a corpus User-Agent, never curl/python
          defaults; send the full captured header set; throttle to <=2 req/s per endpoint with 50-200ms
          jitter; use captured identifiers, never enumerate id spaces; on a 403/500/"inactive"/"No active
          account" lockout signal, STOP and record a blocker.

          STEP B — call delegate_task to run one sub-agent PER target endpoint (subagent_type="bash",
          REQUIRED). You may run several in parallel (atom caps concurrency at 4). Give each this EXACT
          prompt, substituting
          <INDEX>/<HOST>, the ATTACKER identity's source item index (<IDENTITY_INDEX>), a VICTIM user id,
          the corpus User-Agent, and the ANTI-BOT RULES text:

            You are testing the hypotheses for ONE target API endpoint. Do only this one. Authorized, live,
            SAFE-BY-DEFAULT — never send destructive/mutating requests (document them as destructive-skipped).
            Targets: {{ targets }}. Capture: {{ capture }}. SDK: {{ workspace }}/sdk/. Vault: api-security-assessment.
            Domain: <HOST>. Attacker identity source item: <IDENTITY_INDEX>. Victim user id: <VICTIM_ID>.
            Corpus User-Agent: <UA>. Anti-bot rules: <RULES>.
            1. Compute the slug and read the hypotheses:
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/targets.py show {{ targets }} --index <INDEX> --part both
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py slug "<METHOD> <PATH>"
                 obsidian vault=api-security-assessment read file="<HOST>/endpoints/<slug>.md"
            2. For EACH hypothesis:
               - Destructive/mutating? Do NOT send. Note it as destructive-skipped, reference
                 [[BLK-destructive-skipped]], and register that blocker.
               - Otherwise test it. Authenticate WITHOUT printing the token — capture it in the SAME
                 command with $(...):
                   TOKEN=$(python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py cred {{ capture }} --index <IDENTITY_INDEX> --field authorization); \
                   curl -sS -X <METHOD> "https://<HOST><path>" -H "Authorization: $TOKEN" -H "User-Agent: <UA>" <other captured headers> <data>
                 For a PRIVACY/IDOR test, authenticate as the ATTACKER and request the VICTIM's id; a 2xx
                 that returns the victim's PII fields = CONFIRMED privacy leak. Record PII by FIELD
                 NAME/presence, never raw values.
            3. Write results to {{ workspace }}/test/<slug>.log.md (write_file):
                 ## Test log — {{ date }}
                 ### H1 — <confirmed | not-vulnerable | inconclusive | blocked>
                 - Attempt: <method path, identity used, UA>
                 - Result: <status + minimal evidence (PII as field names)>
                 - Blocker (if any): [[BLK-<slug>]] — <one line>
               Append it: python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py append --vault api-security-assessment --domain <HOST> --slug <slug> --from {{ workspace }}/test/<slug>.log.md
            3b. For each hypothesis you CONFIRMED (a real, reproduced vulnerability — especially a
                privacy/PII leak), emit a structured finding. Write {{ workspace }}/test/<slug>.<Hn>.finding.json
                (write_file) as:
                  {"title": "<one-line vuln title>",
                   "description": "<what an unauthorized caller obtains and why it is a vuln — PII by field name, never raw values>",
                   "evidence": ["<the EXACT tokenless one-liner that reproduced it: TOKEN=$(python3 /mnt/skill_library/api-recon-toolkit/scripts/burp.py cred {{ capture }} --index <IDENTITY_INDEX> --field authorization); curl -sS -X <METHOD> 'https://<HOST><path>' -H \"Authorization: $TOKEN\" -H 'User-Agent: <UA>' <other headers>>"]}
                NEVER put a raw token in evidence — mint it inline with $(...). Then append it:
                  python3 /mnt/skill_library/api-recon-toolkit/scripts/findings.py add --from {{ workspace }}/test/<slug>.<Hn>.finding.json --to {{ workspace }}/findings.jsonl
                (findings.py REJECTS a raw JWT — if it errors, fix the evidence to use $(...).)
            4. For every blocker you hit, register it (idempotent). Write a one-line description to
               {{ workspace }}/test/<slug>.blk.md, then:
                 python3 /mnt/skill_library/api-recon-toolkit/scripts/vault_note.py blocker --vault api-security-assessment --domain <HOST> --id <blocker-slug> --endpoint <slug> --desc-from {{ workspace }}/test/<slug>.blk.md
               Blocker slugs (prefer these): no-second-account, no-victim-id, auth-expired, waf-403,
               rate-limited, mfa-required, destructive-skipped, endpoint-unreachable, needs-write-scope.
            5. Reply ONE line: "<METHOD> <PATH> -> confirmed=<n> findings=<n> blocked=<n>".

          STEP C — report (you do this): after all sub-agents report, write {{ outputs }}/test-report.md —
          confirmed findings by severity (call out privacy/PII leaks), the count of findings emitted to
          {{ workspace }}/findings.jsonl (python3 /mnt/skill_library/api-recon-toolkit/scripts/findings.py
          list {{ workspace }}/findings.jsonl), plus a blocker table: for each BLK-*.md under
          <HOST>/blockers/, its id, status, and the count of affected endpoints. Call present_files on
          {{ outputs }}/test-report.md. The findings.jsonl feeds the next step (Confirm).
